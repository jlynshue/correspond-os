name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (cli, core, shared)'
        required: true
        default: 'cli'
        type: choice
        options:
          - cli
          - core
          - shared
          - all

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:ci

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish @correspond-os/shared
        if: ${{ github.event.inputs.package == 'shared' || github.event.inputs.package == 'all' || github.event_name == 'release' }}
        run: cd packages/shared && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @correspond-os/core
        if: ${{ github.event.inputs.package == 'core' || github.event.inputs.package == 'all' || github.event_name == 'release' }}
        run: cd packages/core && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish correspond-os (CLI)
        if: ${{ github.event.inputs.package == 'cli' || github.event.inputs.package == 'all' || github.event_name == 'release' }}
        run: cd packages/cli && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
