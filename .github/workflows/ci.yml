name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    name: Quality & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test:ci

      - name: Build
        run: bun run build

  harness-check:
    name: Harness Validation
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate harness criteria
        run: bun run packages/core/src/harness/validate.ts

      - name: Generate evidence report
        run: bun run packages/core/src/harness/report.ts

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harness-evidence-${{ github.sha }}
          path: .harness/evidence/
          retention-days: 30
